<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trillink — transmit structured messages over any voice channel" />
    <title>Trillink</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0f1117;
        --surface: #1a1d2e;
        --border: #2d3055;
        --accent: #4f8ef7;
        --accent-dim: #2a4a8a;
        --green: #3ddc84;
        --red: #ff5c5c;
        --text: #e2e4f0;
        --muted: #6b7094;
        --radius: 8px;
        --font: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        min-height: 100dvh;
      }
      #app { display: contents; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
